    <meta name="twitter:description" content="Koudou tracks every job opportunity from first lead to signed offer — pipeline, contacts, interviews, and follow-ups in one calm command center.">
    <!--
      Favicon set — regenerated from the canonical Koudou K-tile mark
      (`src/assets/brand/marks/`). All sizes share the same 14% padding /
      72% K coverage, so the icon reads consistently from a 16px tab to a
      512px PWA splash.

      Order matters: browsers walk these top-down and use the first one
      they understand. Light/dark variants use `media` so Safari/Firefox
      pick the inverted-contrast tile that pops against the active tab
      strip; Chrome ignores `media` on icons and falls back to the next
      <link>, which is the canonical dark (navy-tile) mark.
    -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-dark.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
